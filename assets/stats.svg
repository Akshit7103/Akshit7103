<svg xmlns="http://www.w3.org/2000/svg" width="440" height="150" viewBox="0 0 440 150" fill="none" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" role="img" aria-label="GitHub activity stats">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173540"/>
      <stop offset="1" stop-color="#0f2630"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36BCF7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#36BCF7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#36BCF7" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>
  <rect x="10" y="10" width="420" height="130" rx="16" fill="url(#bg)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#sh)"/>
  <rect x="32" y="34" width="9" height="9" rx="2" fill="#36BCF7"/>
  <text x="50" y="42" font-size="13" font-weight="700" letter-spacing="2" fill="#8fb3c6">GITHUB ACTIVITY</text>
  <line x1="220" y1="60" x2="220" y2="120" stroke="#2c5364" stroke-opacity="0.55"/>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.20s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.5s" begin="0.20s" fill="freeze"/>
    <text x="120" y="98" text-anchor="middle" font-size="34" font-weight="800" fill="#36BCF7">556</text>
    <text x="120" y="122" text-anchor="middle" font-size="11.5" letter-spacing="0.5" fill="#8fb3c6">Total Commits</text>
  </g>
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.40s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 10" to="0 0" dur="0.5s" begin="0.40s" fill="freeze"/>
    <text x="320" y="98" text-anchor="middle" font-size="34" font-weight="800" fill="#eaf4f8">447</text>
    <text x="320" y="122" text-anchor="middle" font-size="11.5" letter-spacing="0.5" fill="#8fb3c6">Contributions · 12 mo</text>
  </g>
  <rect x="10" y="138" width="420" height="2" fill="url(#edge)"/>
</svg>
