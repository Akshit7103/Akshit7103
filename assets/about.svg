<svg xmlns="http://www.w3.org/2000/svg" width="760" height="300" viewBox="0 0 760 300" fill="none" role="img" aria-label="About Akshit Mahajan">
  <defs>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#122530"/>
      <stop offset="1" stop-color="#0d1b23"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3540"/>
      <stop offset="1" stop-color="#162c35"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36BCF7" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#36BCF7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#36BCF7" stop-opacity="0"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <clipPath id="body"><rect x="8" y="46" width="744" height="246"/></clipPath>
  </defs>

  <!-- window -->
  <rect x="8" y="8" width="744" height="284" rx="14" fill="url(#win)" stroke="#2c5364" stroke-opacity="0.6" filter="url(#sh)"/>

  <!-- title bar -->
  <path d="M8 22 a14 14 0 0 1 14 -14 h716 a14 14 0 0 1 14 14 v24 h-744 z" fill="url(#bar)"/>
  <circle cx="34" cy="27" r="6" fill="#ff5f56"/>
  <circle cx="56" cy="27" r="6" fill="#ffbd2e"/>
  <circle cx="78" cy="27" r="6" fill="#27c93f"/>
  <text x="380" y="32" text-anchor="middle" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="13" fill="#6f8a9a">akshit@github — bio.sh</text>
  <rect x="8" y="45" width="744" height="1" fill="#2c5364" fill-opacity="0.5"/>

  <g clip-path="url(#body)" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="16">

    <!-- line 1-2 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.2s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-8 0" to="0 0" dur="0.5s" begin="0.2s" fill="freeze"/>
      <text x="34" y="86"><tspan fill="#36BCF7">$</tspan><tspan fill="#c7dbe4" dx="10">whoami</tspan></text>
      <text x="34" y="112"><tspan fill="#22d3ee">▸</tspan><tspan fill="#ffffff" dx="12" font-weight="700">Akshit Mahajan</tspan><tspan fill="#9fc6da"> — AI / ML Engineer</tspan></text>
    </g>

    <!-- line 3-4 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.0s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-8 0" to="0 0" dur="0.5s" begin="1.0s" fill="freeze"/>
      <text x="34" y="146"><tspan fill="#36BCF7">$</tspan><tspan fill="#c7dbe4" dx="10">cat focus.txt</tspan></text>
      <text x="34" y="172"><tspan fill="#22d3ee">▸</tspan><tspan fill="#9fc6da" dx="12">LLM Agents · RAG · Computer Vision · Voice AI</tspan></text>
    </g>

    <!-- line 5-6 -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="1.8s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-8 0" to="0 0" dur="0.5s" begin="1.8s" fill="freeze"/>
      <text x="34" y="206"><tspan fill="#36BCF7">$</tspan><tspan fill="#c7dbe4" dx="10">./shipped --count</tspan></text>
      <text x="34" y="232"><tspan fill="#22d3ee">▸</tspan><tspan fill="#7fe0a6" dx="12" font-weight="700">40+</tspan><tspan fill="#9fc6da"> production AI apps, built end-to-end</tspan></text>
    </g>

    <!-- line 7-8 + cursor -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="2.6s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="-8 0" to="0 0" dur="0.5s" begin="2.6s" fill="freeze"/>
      <text x="34" y="266"><tspan fill="#36BCF7">$</tspan><tspan fill="#c7dbe4" dx="10">echo "$PHILOSOPHY"</tspan></text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="3.0s" fill="freeze"/>
      <text x="34" y="292" font-style="italic"><tspan fill="#22d3ee">▸</tspan><tspan fill="#bfe4f4" dx="12">"AI reasons, code decides."</tspan></text>
    </g>
    <rect x="322" y="280" width="10" height="16" fill="#36BCF7" opacity="0">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.62;0.63;0.81;0.82" dur="4.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- bottom accent glow -->
  <rect x="8" y="290" width="744" height="2" fill="url(#edge)"/>
</svg>
