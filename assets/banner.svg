<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none" role="img" aria-label="Akshit Mahajan — AI / ML Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f2027"/>
      <stop offset="0.55" stop-color="#203a43"/>
      <stop offset="1" stop-color="#2c5364"/>
    </linearGradient>
    <radialGradient id="blob" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#36BCF7" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#36BCF7" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#36BCF7"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="42"/>
    </filter>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="300" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1200" height="300" fill="url(#bg)"/>

    <!-- drifting aurora glows -->
    <g filter="url(#soft)" opacity="0.75">
      <circle cx="250" cy="70" r="120" fill="url(#blob)">
        <animateTransform attributeName="transform" type="translate" values="0 0; 60 40; 0 0" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle cx="1010" cy="250" r="150" fill="url(#blob)">
        <animateTransform attributeName="transform" type="translate" values="0 0; -55 -35; 0 0" dur="23s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- neural constellation (right) -->
    <g stroke="#36BCF7" stroke-width="1" opacity="0.28">
      <line x1="840" y1="95"  x2="940" y2="70"/>
      <line x1="940" y1="70"  x2="1050" y2="95"/>
      <line x1="1050" y1="95" x2="1140" y2="120"/>
      <line x1="840" y1="95"  x2="890" y2="162"/>
      <line x1="940" y1="70"  x2="1000" y2="150"/>
      <line x1="1050" y1="95" x2="1000" y2="150"/>
      <line x1="1000" y1="150" x2="1095" y2="188"/>
      <line x1="890" y1="162" x2="862" y2="228"/>
      <line x1="1000" y1="150" x2="978" y2="236"/>
      <line x1="1095" y1="188" x2="1086" y2="242"/>
      <line x1="978" y1="236" x2="1086" y2="242"/>
      <line x1="890" y1="162" x2="1000" y2="150"/>
    </g>
    <g fill="#7fd8ff" filter="url(#glow)">
      <circle cx="840" cy="95" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" begin="0s"   repeatCount="indefinite"/></circle>
      <circle cx="940" cy="70" r="5.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="4.0s" begin="0.6s" repeatCount="indefinite"/></circle>
      <circle cx="1050" cy="95" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" begin="1.1s" repeatCount="indefinite"/></circle>
      <circle cx="1140" cy="120" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.8s" begin="0.3s" repeatCount="indefinite"/></circle>
      <circle cx="890" cy="162" r="5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.5s" begin="1.6s" repeatCount="indefinite"/></circle>
      <circle cx="1000" cy="150" r="6"><animate attributeName="opacity" values="0.4;1;0.4" dur="4.2s" begin="0.9s" repeatCount="indefinite"/></circle>
      <circle cx="1095" cy="188" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" begin="2.0s" repeatCount="indefinite"/></circle>
      <circle cx="862" cy="228" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.9s" begin="1.3s" repeatCount="indefinite"/></circle>
      <circle cx="978" cy="236" r="4.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" begin="0.5s" repeatCount="indefinite"/></circle>
      <circle cx="1086" cy="242" r="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="1.9s" repeatCount="indefinite"/></circle>
    </g>

    <!-- name -->
    <g opacity="0">
      <animate attributeName="opacity" from="0" to="1" dur="0.9s" begin="0.15s" fill="freeze"/>
      <animateTransform attributeName="transform" type="translate" from="0 16" to="0 0" dur="0.9s" begin="0.15s" fill="freeze"/>
      <text x="72" y="150" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="66" font-weight="800" fill="#ffffff" filter="url(#glow)">Akshit Mahajan</text>
    </g>

    <!-- growing accent underline -->
    <rect x="74" y="172" height="4" rx="2" width="0" fill="url(#accent)">
      <animate attributeName="width" from="0" to="366" dur="1.1s" begin="0.5s" fill="freeze"/>
    </rect>

    <!-- subtitle -->
    <text x="76" y="214" font-family="'Segoe UI', 'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="22" font-weight="500" letter-spacing="5" fill="#9fc6da" opacity="0">AI · ML · LLMs · Computer Vision
      <animate attributeName="opacity" from="0" to="1" dur="1s" begin="0.75s" fill="freeze"/>
    </text>

    <!-- sweeping light bar -->
    <rect x="0" y="296" width="1200" height="4" fill="#0b171d"/>
    <rect x="-220" y="296" width="220" height="4" fill="url(#accent)">
      <animate attributeName="x" values="-220;1200" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
