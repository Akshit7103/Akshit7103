<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" fill="none" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" role="img" aria-label="What I build: LLM agents, RAG, computer vision, voice AI, ML, full-stack">
  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#173540"/>
      <stop offset="1" stop-color="#0f2630"/>
    </linearGradient>
    <filter id="cs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000000" flood-opacity="0.40"/>
    </filter>
  </defs>

  <!-- ══ Card 1 · LLM & Agentic AI ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.10s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.10s" fill="freeze"/>
    <rect x="15" y="15" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="273" cy="37" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.2s" begin="0s" repeatCount="indefinite"/></circle>
    <g transform="translate(37,39)" stroke="#36BCF7" stroke-width="1.6">
      <line x1="14" y1="14" x2="4" y2="5"/><line x1="14" y1="14" x2="25" y2="7"/><line x1="14" y1="14" x2="8" y2="25"/>
      <circle cx="14" cy="14" r="3.6" fill="#36BCF7" stroke="none"/>
      <circle cx="4" cy="5" r="2.4" fill="#7fd8ff" stroke="none"/><circle cx="25" cy="7" r="2.4" fill="#7fd8ff" stroke="none"/><circle cx="8" cy="25" r="2.4" fill="#7fd8ff" stroke="none"/>
    </g>
    <text x="79" y="56" font-size="16.5" font-weight="700" fill="#eaf4f8">LLM &amp; Agentic AI</text>
    <text x="39" y="90" font-size="12.5" fill="#9fc6da">Multi-agent pipelines · tool-calling</text>
    <text x="39" y="112" font-size="12.5" fill="#9fc6da">structured outputs · live streaming</text>
  </g>

  <!-- ══ Card 2 · RAG & NLP ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.22s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.22s" fill="freeze"/>
    <rect x="310" y="15" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="568" cy="37" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.6s" begin="0.5s" repeatCount="indefinite"/></circle>
    <g transform="translate(332,39)" stroke="#36BCF7" stroke-width="1.8" stroke-linecap="round" fill="none">
      <line x1="1" y1="7" x2="8" y2="7"/><line x1="1" y1="13" x2="6" y2="13"/>
      <circle cx="16" cy="12" r="7"/><line x1="21" y1="17" x2="27" y2="23"/>
    </g>
    <text x="374" y="56" font-size="16.5" font-weight="700" fill="#eaf4f8">RAG &amp; NLP</text>
    <text x="334" y="90" font-size="12.5" fill="#9fc6da">Hybrid retrieval · rerankers</text>
    <text x="334" y="112" font-size="12.5" fill="#9fc6da">semantic chunking · cited Q&amp;A</text>
  </g>

  <!-- ══ Card 3 · Computer Vision ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.34s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.34s" fill="freeze"/>
    <rect x="605" y="15" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="863" cy="37" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" begin="1.0s" repeatCount="indefinite"/></circle>
    <g transform="translate(627,39)" stroke="#36BCF7" stroke-width="1.8" fill="none">
      <path d="M2 14 C7 6 21 6 26 14 C21 22 7 22 2 14 Z"/>
      <circle cx="14" cy="14" r="3.6" fill="#36BCF7" stroke="none"/>
    </g>
    <text x="669" y="56" font-size="16.5" font-weight="700" fill="#eaf4f8">Computer Vision</text>
    <text x="629" y="90" font-size="12.5" fill="#9fc6da">Detection &amp; tracking · face ID</text>
    <text x="629" y="112" font-size="12.5" fill="#9fc6da">OCR · image forensics</text>
  </g>

  <!-- ══ Card 4 · Voice AI ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.46s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.46s" fill="freeze"/>
    <rect x="15" y="157" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="273" cy="179" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" begin="1.4s" repeatCount="indefinite"/></circle>
    <g transform="translate(37,181)" stroke="#36BCF7" stroke-width="1.8" stroke-linecap="round" fill="none">
      <rect x="10" y="2" width="8" height="15" rx="4"/>
      <path d="M6 13 a8 8 0 0 0 16 0"/>
      <line x1="14" y1="21" x2="14" y2="26"/><line x1="9" y1="26" x2="19" y2="26"/>
    </g>
    <text x="79" y="198" font-size="16.5" font-weight="700" fill="#eaf4f8">Voice AI</text>
    <text x="39" y="232" font-size="12.5" fill="#9fc6da">Real-time speech-to-speech</text>
    <text x="39" y="254" font-size="12.5" fill="#9fc6da">telephony bots · transcription</text>
  </g>

  <!-- ══ Card 5 · ML & Analytics ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.58s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.58s" fill="freeze"/>
    <rect x="310" y="157" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="568" cy="179" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.7s" begin="0.8s" repeatCount="indefinite"/></circle>
    <g transform="translate(332,181)">
      <rect x="2" y="16" width="4.5" height="10" rx="1" fill="#36BCF7"/>
      <rect x="9.5" y="10" width="4.5" height="16" rx="1" fill="#4fc6f7"/>
      <rect x="17" y="4" width="4.5" height="22" rx="1" fill="#7fd8ff"/>
      <rect x="24.5" y="13" width="4.5" height="13" rx="1" fill="#4fc6f7"/>
    </g>
    <text x="374" y="198" font-size="16.5" font-weight="700" fill="#eaf4f8">ML &amp; Analytics</text>
    <text x="334" y="232" font-size="12.5" fill="#9fc6da">Classification · clustering</text>
    <text x="334" y="254" font-size="12.5" fill="#9fc6da">anomaly detection · SHAP</text>
  </g>

  <!-- ══ Card 6 · Full-Stack & Deploy ══ -->
  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" dur="0.5s" begin="0.70s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" from="0 14" to="0 0" dur="0.5s" begin="0.70s" fill="freeze"/>
    <rect x="605" y="157" width="280" height="128" rx="14" fill="url(#card)" stroke="#36BCF7" stroke-opacity="0.3" filter="url(#cs)"/>
    <circle cx="863" cy="179" r="3.5" fill="#36BCF7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.3s" begin="1.7s" repeatCount="indefinite"/></circle>
    <g transform="translate(627,181)" stroke="#36BCF7" stroke-width="1.7" fill="none" stroke-linejoin="round">
      <path d="M14 3 L26 9.5 L14 16 L2 9.5 Z" fill="#36BCF7" fill-opacity="0.18"/>
      <path d="M2 14 L14 20.5 L26 14"/><path d="M2 19 L14 25.5 L26 19"/>
    </g>
    <text x="669" y="198" font-size="16.5" font-weight="700" fill="#eaf4f8">Full-Stack &amp; Deploy</text>
    <text x="629" y="232" font-size="12.5" fill="#9fc6da">FastAPI · Flask · Next.js</text>
    <text x="629" y="254" font-size="12.5" fill="#9fc6da">SQL + vector DBs · Docker</text>
  </g>
</svg>
